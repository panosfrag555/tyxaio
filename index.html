<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Menu</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: black;
      font-family: Arial, sans-serif;
    }

    #video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      background: black;
    }

    #start {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: black;
      color: white;
      font-size: 22px;
      z-index: 10;
      cursor: pointer;
      text-align: center;
      padding: 20px;
    }

    #start.hidden {
      display: none;
    }
  </style>
</head>
<body>
  <div id="start">Αγγίξτε για προβολή μενού</div>

  <video id="video" muted playsinline webkit-playsinline preload="auto">
    <source src="Presentation1.mp4" type="video/mp4">
  </video>

  <script>
    const start = document.getElementById('start');
    const video = document.getElementById('video');

    function playVideo() {
      video.play();
      start.classList.add('hidden');
    }

    start.addEventListener('click', playVideo);
    start.addEventListener('touchstart', playVideo, { passive: true });
  </script>
</body>
</html>
