<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Menu</title>

  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: white;
      font-family: Arial, sans-serif;
    }

    #video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    #start {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: white;
      color: black;
      font-size: 22px;
      z-index: 10;
      text-align: center;
      padding: 20px;
      cursor: pointer;
    }

    #start.hidden {
      display: none;
    }
  </style>
</head>

<body>

<div id="start">Αγγίξτε για προβολή μενού</div>

<video id="video" controls muted playsinline preload="auto">
  <!-- ΣΗΜΑΝΤΙΚΟ: το σωστό path -->
  <source src="/tyxaio/Presentation.mp4" type="video/mp4">
</video>

<script>
  const start = document.getElementById('start');
  const video = document.getElementById('video');

  function playVideo() {
    video.play().catch(err => console.log(err));
    start.classList.add('hidden');
  }

  start.addEventListener('click', playVideo);
  start.addEventListener('touchstart', playVideo, { passive: true });

  video.addEventListener('error', () => {
    console.log('Video error:', video.error);
    alert("Το video δεν φορτώνει. Έλεγξε το path ή το αρχείο.");
  });
</script>

</body>
</html>
