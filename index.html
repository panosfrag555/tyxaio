<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Menu</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: black;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    #overlay {
      position: fixed;
      inset: 0;
      background: black;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      z-index: 10;
    }

    #overlay.hidden {
      display: none;
    }
  </style>
</head>

<body>

<div id="overlay">Αγγίξτε για προβολή</div>

<video id="video" muted playsinline webkit-playsinline>
  <source src="Presentation1.mp4" type="video/mp4">
</video>

<script>
  const video = document.getElementById("video");
  const overlay = document.getElementById("overlay");

  video.play().then(() => {
    overlay.classList.add("hidden");
  }).catch(() => {
    overlay.classList.remove("hidden");
  });

  function start() {
    video.play();
    overlay.classList.add("hidden");
  }

  overlay.addEventListener("click", start);
  overlay.addEventListener("touchstart", start);
</script>

</body>
</html>
